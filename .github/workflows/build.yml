name: Build Custom Caddy

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'
          check-latest: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Get latest Caddy version
        id: version
        run: |
          VERSION=$(curl -fsSL https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name')

          TAG="custom-${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl \
            -s \
            -o /dev/null \
            -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }})

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if release already exists
        if: steps.exists.outputs.exists == 'true'
        run: |
          echo "Release already exists."
          exit 0

      - name: Build Caddy with plugins
        if: steps.exists.outputs.exists == 'false'
        env:
          CGO_ENABLED: 0 
        run: |
          ~/go/bin/xcaddy build \
            --with github.com/mholt/caddy-l4 \
            --with github.com/caddyserver/forwardproxy=github.com/klzgrad/forwardproxy@naive

      - name: Prepare assets
        if: steps.exists.outputs.exists == 'false'
        run: |
          mv caddy caddy-linux-amd64

          tar -czf caddy-linux-amd64.tar.gz caddy-linux-amd64

          sha256sum \
            caddy-linux-amd64 \
            caddy-linux-amd64.tar.gz \
            > SHA256SUMS

      - name: Publish Release
        if: steps.exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Custom Caddy ${{ steps.version.outputs.version }}
          make_latest: true
          generate_release_notes: true
          files: |
            caddy-linux-amd64
            caddy-linux-amd64.tar.gz
            SHA256SUMS
